<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<title>Dadan & Minah</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(#fff,#f5f1e8);
  text-align:center;
}

h1,h2{font-family:'Playfair Display',serif;}
.gold{color:#c9a85d;}

.section{
  padding:60px 20px;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

.card{
  background:#fff;
  margin:20px auto;
  padding:25px;
  border-radius:15px;
  max-width:400px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

button{
  padding:12px 25px;
  border:none;
  background:#c9a85d;
  color:white;
  border-radius:25px;
}

</style>
</head>

<body>

<div id="cover" style="height:100vh;display:flex;flex-direction:column;justify-content:center;">
  <h2>Undangan Pernikahan</h2>
  <h1 class="gold">Dadan & Minah</h1>
  <button onclick="openInv()">Buka Undangan</button>
</div>

<div id="content" style="display:none;">

<div class="section">
  <p>“Dan di antara tanda-tanda kebesaran-Nya ialah Dia menciptakan pasangan-pasangan untukmu...”</p>
</div>

<div class="section">
  <h2 class="gold">Ahmad Ramadani & Siti Aminah</h2>
</div>

<div class="section">
  <div class="card">
    <h3>Mempelai Pria</h3>
    <p>Ahmad Ramadani (Dadan)</p>
  </div>

  <div class="card">
    <h3>Mempelai Wanita</h3>
    <p>Siti Aminah (Minah)</p>
  </div>
</div>

</div>

<script>
function openInv(){
  document.getElementById("cover").style.display="none";
  document.getElementById("content").style.display="block";
}

window.addEventListener("scroll",()=>{
  document.querySelectorAll(".section").forEach(sec=>{
    if(window.scrollY > sec.offsetTop-300){
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
